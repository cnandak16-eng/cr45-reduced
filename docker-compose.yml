services:
  postgres:
    image: postgres:16
    container_name: cr45-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cr45_reduced
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: cnk19/cr45-backend:latest
    container_name: cr45-backend
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/cr45_reduced?sslmode=disable
    expose:
      - "8080"

  frontend:
    build: cnk19/cr45-frontend:latest
    container_name: cr45-frontend
    depends_on:
      - backend
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: cr45-nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  postgres_data: